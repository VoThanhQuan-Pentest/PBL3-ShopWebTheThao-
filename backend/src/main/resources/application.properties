spring.application.name=flare-fitness-backend

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flare_fitness?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=FlareFitnessHikariPool
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:Hoangngocnguyen2006@gmail.com}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

management.endpoints.web.exposure.include=health,info

app.jwt.secret=${APP_JWT_SECRET:replace-this-secret-with-at-least-32-characters}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080}
app.security.login.max-attempts-per-minute=${APP_SECURITY_LOGIN_MAX_ATTEMPTS_PER_MINUTE:5}
app.security.token-prefix=${APP_SECURITY_TOKEN_PREFIX:auth:token:}
app.security.login-attempt-prefix=${APP_SECURITY_LOGIN_ATTEMPT_PREFIX:auth:login-attempt:}
app.cache.product-prefix=${APP_CACHE_PRODUCT_PREFIX:cache:product:}
app.cache.product-list-key=${APP_CACHE_PRODUCT_LIST_KEY:cache:products:all}
app.cache.product-ttl-seconds=${APP_CACHE_PRODUCT_TTL_SECONDS:300}
app.otp.redis-prefix=${APP_OTP_REDIS_PREFIX:auth:otp:}
app.otp.ttl-seconds=${APP_OTP_TTL_SECONDS:300}
app.otp.cooldown-seconds=${APP_OTP_COOLDOWN_SECONDS:60}
app.mail.from=${APP_MAIL_FROM:Hoangngocnguyen2006@gmail.com}

logging.level.org.springframework.security=INFO
logging.level.com.flarefitness.backend=INFO
