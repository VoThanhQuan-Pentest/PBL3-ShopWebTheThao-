services:
  app:
    build:
      context: ./backend
    container_name: flare-fitness-app
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/flare_fitness?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: flare
      SPRING_DATASOURCE_PASSWORD: flare123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: replace-this-secret-with-at-least-32-characters
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flare-fitness-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: flare-fitness-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - "./Front end:/usr/share/nginx/html:ro"
    restart: unless-stopped
